# Render blueprint for the Everyday agent service (Bounty + section agents +
# Gemini -> Qwen -> Gemma model chain). Deploy: New -> Blueprint -> point at this repo.
# Root directory must be local-voice/service so the Dockerfile context is right.
services:
  - type: web
    name: everyday-agent
    runtime: docker
    rootDir: local-voice/service
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      # Primary Bounty brain: Google AI Studio / Gemini API. Keep this server-side.
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      # Second fallback: Qwen through an OpenAI-compatible endpoint.
      # Point this at hosted Qwen first, then swap to your own vLLM box later.
      - key: LLM_OPENAI_BASE_URL
        sync: false
      - key: LLM_OPENAI_MODEL
        value: Qwen/Qwen3-8B
      - key: LLM_OPENAI_KEY
        sync: false
      # Third fallback: Google AI Studio Gemma model when available.
      - key: GOOGLE_GEMMA_MODEL
        value: gemma-3-4b-it
      # Legacy alias; prefer GEMINI_API_KEY for new deploys.
      - key: GOOGLE_AI_KEY
        sync: false
      # Next.js API base — your Vercel deployment, for section-agent tool calls.
      - key: EVERYDAY_API_BASE
        sync: false
      # CORS allow-list — your deployed frontend origin(s), comma-separated.
      - key: ALLOWED_ORIGINS
        sync: false
